# ─────────────────────────────────────────────────────────────────────────────
# Shared network — all services communicate here
# ─────────────────────────────────────────────────────────────────────────────
networks:
  insurance-net:
    driver: bridge

# ─────────────────────────────────────────────────────────────────────────────
# Named volumes — data survives container restarts
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
  memgraph-data:
  kafka-data:

# ─────────────────────────────────────────────────────────────────────────────
# Re-usable FastAPI service defaults
# ─────────────────────────────────────────────────────────────────────────────
x-fastapi-defaults: &fastapi-defaults
  restart: unless-stopped
  networks:
    - insurance-net
  env_file:
    - .env
  environment:
    # macOS Docker Desktop doesn't forward FSEvents as inotify, so uvicorn --reload
    # would never detect file changes without forcing watchfiles to use polling.
    WATCHFILES_FORCE_POLLING: "true"
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ───────────────────────────────────────────────────────────────────────────
  # Databases
  # ───────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: insurance-postgres
    restart: unless-stopped
    networks:
      - insurance-net
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-insurance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-insurance_secret}
      POSTGRES_DB: ${POSTGRES_DB:-insurance_db}
    ports:
      - "5434:5432" # host 5434 — avoids conflict if another Postgres is running on 5432/5433
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./shared/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-insurance}"]
      interval: 10s
      timeout: 5s
      retries: 5

  memgraph:
    image: memgraph/memgraph-platform:latest
    container_name: insurance-memgraph
    restart: unless-stopped
    networks:
      - insurance-net
    ports:
      - "7688:7687" # Bolt protocol
      - "7445:7444" # Memgraph Lab UI
      - "3001:3000" # Memgraph Lab web UI (mapped to 3001 to avoid conflict with frontend/host node)
    volumes:
      - memgraph-data:/var/lib/memgraph
    environment:
      MEMGRAPH_TELEMETRY_ENABLED: "false"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7687"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ───────────────────────────────────────────────────────────────────────────
  # Backend microservices
  # ───────────────────────────────────────────────────────────────────────────
  # ───────────────────────────────────────────────────────────────────────────
  # Kafka (KRaft — no Zookeeper)
  # ───────────────────────────────────────────────────────────────────────────
  kafka:
    image: apache/kafka:latest
    container_name: insurance-kafka
    restart: unless-stopped
    networks:
      - insurance-net
    ports:
      - "9092:9092" # internal listener  (service → service)
      - "9094:9094" # external listener  (host tools, Postman Kafka plugins)
    volumes:
      - kafka-data:/var/lib/kafka/data
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list",
        ]
      interval: 15s
      timeout: 10s
      retries: 5

  # ───────────────────────────────────────────────────────────────────────────
  # Kafka UI — browse topics & messages at http://localhost:8090
  # ───────────────────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: insurance-kafka-ui
    restart: unless-stopped
    networks:
      - insurance-net
    ports:
      - "8090:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: insurance-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  api-gateway:
    <<: *fastapi-defaults
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: insurance-api-gateway
    ports:
      - "8010:8000"
    volumes:
      - ./services/api-gateway:/app
      - ./shared:/app/shared
    environment:
      PYTHONPATH: /app
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      risk-engine:
        condition: service_healthy

  tenant-service:
    <<: *fastapi-defaults
    build:
      context: ./services/tenant-service
      dockerfile: Dockerfile
    container_name: insurance-tenant-service
    ports:
      - "8011:8001"
    volumes:
      - ./services/tenant-service:/app
      - ./shared:/app/shared
    environment:
      PYTHONPATH: /app
      DATABASE_URL: ${DATABASE_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      OCR_ENGINE_URL: http://ocr-engine:8004
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  risk-engine:
    <<: *fastapi-defaults
    build:
      context: ./services/risk-engine
      dockerfile: Dockerfile
    container_name: insurance-risk-engine
    ports:
      - "8012:8002"
    volumes:
      - ./services/risk-engine:/app
      - ./shared:/app/shared
    environment:
      PYTHONPATH: /app
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      memgraph:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8002/health'')"',
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s # allow time for pip install on first cold start

  decision-engine:
    <<: *fastapi-defaults
    build:
      context: ./services/decision-engine
      dockerfile: Dockerfile
    container_name: insurance-decision-engine
    ports:
      - "8013:8003"
    volumes:
      - ./services/decision-engine:/app

  ocr-engine:
    <<: *fastapi-defaults
    build:
      context: ./services/ocr-engine
      dockerfile: Dockerfile
    container_name: insurance-ocr-engine
    ports:
      - "8014:8004"
    volumes:
      - ./services/ocr-engine:/app
      - ./shared/documents:/data # Required for the /extract-from-path endpoint

  # khalid
  text-summarizer:
    <<: *fastapi-defaults
    build:
      context: ./services/text-summarizer
      dockerfile: Dockerfile
    container_name: insurance-text-summarizer
    ports:
      - "8015:8005"
    volumes:
      - ./services/text-summarizer:/app

  # ───────────────────────────────────────────────────────────────────────────
  # Docs (Docusaurus) — http://localhost:4991
  # ───────────────────────────────────────────────────────────────────────────
  docs:
    image: node:20-alpine
    container_name: insurance-docs
    restart: unless-stopped
    working_dir: /app
    networks:
      - insurance-net
    ports:
      - "4991:4991"
    volumes:
      - ./docs:/app
      - /app/node_modules # prevent host node_modules from being used inside container
    command: sh -c "npm install && npm start"

  # ───────────────────────────────────────────────────────────────────────────
  # Frontend (Next.js App Router)
  # ───────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev # use the dev stage for hot-reload during development
    container_name: insurance-frontend
    restart: unless-stopped
    networks:
      - insurance-net
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app # hot-reload source files
      - /app/node_modules # prevent host node_modules from overwriting container's
      - /app/.next # preserve Next.js build cache between restarts
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8010 # browser-side; host port that maps to gateway container port 8000
      CHOKIDAR_USEPOLLING: "true" # macOS Docker Desktop: FSEvents don't reach chokidar via inotify
